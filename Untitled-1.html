<script>
    const questionBank = [
        {text: "14-1. Several cans of different sizes and shapes are all filled with the same liquid to the same depth. Then:", image: "", options: ["a. the weight of the liquid is the same for all cans", "b. the force to the liquid on the bottom of each can is the same", "c. the least pressure is at the bottom of the can with the largest bottom area", "d. the greatest pressure is at the bottom of the can with the largest bottom area", "e. the pressure at the bottom of each can is the same"], answer: 4},
        {text: "14-2. To obtain the absolute pressure from the gauge pressure:", image: "", options: ["a. subtract atmospheric pressure", "b. add atmospheric pressure", "c. subtract 273", "d. add 273", "e. convert to N/m2"], answer: 1},
        {text: "14-3. What would be the height of the atmospheric if the air density remained constant with height? Assume a sea-level density of 1.3 kg/m3 and sea-level pressure of 1.01 x 10^5 pa. Answer in km.", image: "", options: ["a. 140", "b. 78", "c. 13", "d. 7.9", "e. 4.8"], answer: 3},
        {text: "14-4. At what depth in a lake is the absolute pressure equal to three times atmospheric pressure? The density of water is 1000 kg/m3 and one atmosphere (assume to be standard) is 1.013 x 10^5 N/m2.", image: "", options: ["a. 10.3", "b. 14.7", "c. 15.8", "d. 18.6", "e. 20.7"], answer: 4},
        {text: "14-5. A drain is blocked solidly at a point 5.3 m below ground level and 100 m from the base of the Arts library. An open sink on the top floor of the library is 32 m above ground level. Assuming a liquid of density 1.2 x 10^3 kg/m3 fills the entire system, calculate the absolute pressure inside the drain pipe just above the blockage. Atmospheric pressure is 1.03 x 10^5 N/m2. Answers are in N/m2.", image: "", options: ["a. 3.4 x 10^5", "b. 4.4 x 10^5", "c. 5.4 x 10^5", "d. 6.4 x 10^5", "e. 7.4 x 10^5"], answer: 2},
        {text: "14-6. In the U-tube arrangement shown in the diagram, both chambers, A and B, are initially open to the atmosphere. The right-hand section of the tube contains a column of oil with an initial height yB; the density of the oil is 0.835 x 10^3 kg/m3. The left-hand section contains water... What is the excess pressure over atmospheric pressure in chamber B?", image: "14.6.png", options: ["a. 15.97 Pa", "b. 179.6 Pa", "c. 967.0 Pa", "d. 11597 Pa", "e. 1.7960 Pa"], answer: 0},
        {text: "14-7. Two identical open cylindrical vessels have their bases at the same level and are filled to the same level H with liquid. In one vessel the liquid has density p2 with p1 > p2... determine an expression for the difference in height of the liquid levels in the vessels after the valve is opened:", image: "14.7.png", options: ["a. H √(1 – p2/p1)", "b. H √(1 – p1/p2)", "c. H (1 – p2/p1)", "d. H (1 – p1/p2)2", "e. H (1 – p1/p2)"], answer: 2},
        {text: "14-8. The manometer shown has both arms open to the atmosphere. What is the density of the oil (in kg/m3)?", image: "14.8.png", options: ["a. 400", "b. 600", "c. 200", "d. 800", "e. 1666"], answer: 0},
        {text: "14-9. An incompressible liquid flows along the pipe as shown. The ratio of the speeds v2/v1 is:", image: "14.9.png", options: ["a. A1/A2", "b. A2/A1", "c. √(A1A2)", "d. √(A2A1)", "e. v1/v2"], answer: 0},
        {text: "14-10. Water flows through a cylindrical pipe of varying cross-section. The velocity is 3 m/s at a point where the pipe diameter is one cm. At a point where the pipe diameter is three cm, the velocity is:", image: "", options: ["a. 9 m/s", "b. 3 m/s", "c. 1 m/s", "d. 0.33 m/s", "e. 0.11 m/s"], answer: 3},
        {text: "14-11. Water flows from a 6 cm diameter pipe into an 8 cm diameter pipe. The speed in the 6 cm pipe is 16 m/s. The speed in the 8 cm pipe is:", image: "", options: ["a. 9 m/s", "b. 12 m/s", "c. 21.3 m/s", "d. 28.4 m/s", "e. 12π m/s"], answer: 0},
        {text: "14-12. Young’s modulus is a proportionality constant that relates the force per unit area applied perpendicularly at the surface end of an object to:", image: "", options: ["a. the shear", "b. the fractional change in volume", "c. the fractional change in length", "d. the pressure", "e. the spring constant"], answer: 2},
        {text: "14-13. The bulk modulus is a proportionality constant which relates the pressure acting on an object to:", image: "", options: ["a. the shear", "b. the fractional change in volume", "c. the fractional change in length", "d. Youngs modulus", "e. the spring constant"], answer: 1},
        {text: "14-14. A certain wire stretches 1 cm when a force F is applied to it. The same force is applied to a wire of the same material but with twice the diameter and twice the length. The second wire stretches:", image: "", options: ["a. 0.25 cm", "b. 0.5 cm", "c. 1 cm", "d. 2 cm", "e. 4 cm"], answer: 1},
        {text: "14-15. A steel wire has an unstretched length of 3.0 meters and a uniform cross-sectional area of 0.20 cm2. Under what load will its length increase by 0.05 cm? Youngs modulus for this kind of steel is 20 x 10^10 N/m2. Answers in N.", image: "", options: ["a. 420", "b. 513", "c. 517", "d. 667", "e. 891"], answer: 3},
        {text: "14-16. A force of 5000 N is applied outwardly to each end of a 5.0 m long rod with a radius of 34.0 cm and a Youngs modulus of 125 x 10^8 N/m2. The elongation in mm of the rod is:", image: "", options: ["a. 0.0020", "b. 0.0040", "c. 0.14", "d. 0.71", "e. 1.42"], answer: 3},
        {text: "14-17. A cube with edges exactly 2 cm long is made of material with a bulk modulus of 3.5 x 10^9 N/m2. When it is subjected to a pressure of 3.0 x 10^5 Pa its volume in cm3 is:", image: "", options: ["a. 7.31", "b. 7.99931", "c. 8.00069", "d. 8.69", "e. none of these"], answer: 1},
        {text: "14-18. A polar bear, of mass 1250 kg, sits at rest on a flat-topped chunk of ice floating as shown with its top at water level. The density of the ice is 925 kg/m3 and of the water is 1030 kg/m3. Calculate the mass of the chunk of ice. Answer in kg.", image: "14.18.png", options: ["a. 41,700", "b. 27,200", "c. 15,400", "d. 11,000", "e. 9,600"], answer: 3},
        {text: "14-19. When a beaker containing water is suspended by a spring scale, it indicates a weight of 1.98 N. A 20.0 g mass of density 2000 kg/m3 is then suspended by a thread and lowered until it is completely submerged in the water but doesnt touch the beaker. What does the spring scale read now?", image: "14.19.png", options: ["a. 1.78 N", "b. 1.88 N", "c. 1.98 N", "d. 2.08 N", "e. 2.18 N"], answer: 3},
        {text: "14-20. A loaded ship passes from a lake (fresh water) to the ocean (salt water). Salt water is more dense than fresh water and as a result the ship will:", image: "", options: ["a. ride higher in the water", "b. settle lower in the water", "c. ride at the same level in the water", "d. experience an increase in buoyant force", "e. experience a decrease in buoyant force"], answer: 0},
        {text: "14-21. A beaker is partly filled with water and then placed on a platform balance. The total mass of the beaker and water is M = 0.30 kg. A cubical block of copper having edge length L = 3.0 cm is suspended from a light string and immersed in the water as shown. Determine the reading (in N) of the platform balance.", image: "14.21.png", options: ["a. 0.27", "b. 2.1", "c. 2.9", "d. 3.2", "e. 5.3"], answer: 3},
        {text: "14-22. A block of ice at 0℃ is floating on the surface of ice water in a beaker. The surface of the water just comes to the top of the beaker. When the ice melts the water level will:", image: "", options: ["a. rise and overflow will occur", "b. remain the same", "c. fall", "d. depend on the initial ratio of water to ice", "e. depend on the shape of the block of ice"], answer: 1},
        {text: "14-23. A block of ice at 0℃ containing a small gold nugget is floating on the surface of ice water in a beaker. When the ice has melted the water level (assuming no one steals the gold):", image: "", options: ["a. is higher", "b. is lower", "c. is the same", "d. depend on the initial ratio of water to ice", "e. depend on the shape of the ice block"], answer: 1},
        {text: "14-24. A hollow plastic ball has a radius of 5.00 cm and a mass of 100 grams. The ball has a tiny hole at the top through which lead shot can be inserted. How many grams of lead can be inserted into the ball before it sinks in water? Assume that the ball does not leak either lead or water.", image: "", options: ["a. 512", "b. 439", "c. 424", "d. 617", "e. 276"], answer: 2},
        {text: "14-25. A cube with 2.0 cm sides is made of material with a bulk modulus of 4.7 x 10^5 N/m2. When it is subjected to a pressure of 2.0 x 10^5 Pa the length in cm of its sides is:", image: "", options: ["a. 0.85", "b. 1.15", "c. 1.66", "d. 2.0", "e. none of these"], answer: 2},
        {text: "14-26. Four physics professor make a boat from an empty cylindrical oil tank. The radius of the circular flat bottom is R = 65 cm, the constant height of the vertical sides is H. Each professor has a mass of 85 kg and the boat has a mass of 45 kg. If it floats in Lake Ontario with the bottom horizontal and the top edge 15 cm above the water level, calculate H. Answers in cm.", image: "14.26.png", options: ["a. 27", "b. 37", "c. 41", "d. 44", "e. 48"], answer: 3},
        {text: "14-27. A cubical block of wood 10 cm on a side floats at the interface between oil and water with its lower surface 2 cm below the interface. The density of the oil is 0.6 gm/cm3. What is the mass of the block?", image: "14.27.png", options: ["a. 480 g", "b. 600 g", "c. 1200 g", "d. 680 g", "e. 550 g"], answer: 3},
        {text: "14-28. A large tank of water, such as a lift lock, contains a boat floating freely near one end, X. The tank and contents are carefully balanced like a teeter-totter on a transverse beam at or near the center, C. If the tank is temporarily clamped while the boat drops its anchor to rest on the bottom, and is then unclamped, what will be the resulting motion of the end of the tank, X?", image: "14.28.png", options: ["a. goes down", "b. stays level", "c. goes up", "d. insufficient information given", "e. oscillates up and down"], answer: 0},
        {text: "14-29. An industrial polluter tows a small spherical tank out into a lake. It floats freely with one quarter of its volume submerged. He fastens anchor to it which pulls it down and holds it one hundred meters below the surface. He later releases the anchor by remote control. Calculate its maximum height above the water surface.", image: "", options: ["a. zero", "b. 100", "c. 200", "d. 300", "e. 400"], answer: 3},
        {text: "14-30. A shipping company has developed hollow spherical barges to transport cargo through the great lakes... The shell of one barge is made of thin steel plate with a mass per unit area of 100 kgm-2 and its radius is 3 m. It is loaded with iron pyrites having a density three times that of water and it floats exactly half submerged. How much cargo is there? Answers in mega grams = Tonnes.", image: "", options: ["a. 45.2", "b. 15.1", "c. 90.5", "d. 56.5", "e. 11.3"], answer: 0},
        {text: "14-31. Something found in most toilet tanks is a spherical float fastened to a stiff rod whose length is about four float diameters and whose mass is about 1/4 that of the float. Such a device is placed in a tub of water and the end of the rod is held up with a string to the ceiling... Which of the following statements about the angle θ is true?", image: "14.31.png", options: ["a. θ = 0", "b. 0 < θ < 90º", "c. θ = 90º", "d. 90º < θ < 180º", "e. θ = 180º"], answer: 2},
        {text: "14-32. Archimedes decided to weigh some solid platinum nuggets while he was sitting on the bottom of his swimming pool completely submerged in water. He used a normal pan balance, and found that his pile of platinum was exactly balanced by a one kilogram block of copper. If the specific gravity of the platinum was 21 and that of the copper was 9, how much platinum did he really have?", image: "", options: ["a. 0.90", "b. 0.93", "c. 0.97", "d. 1.07", "e. 1.11"], answer: 1},
        {text: "14-33. While an aircraft carrier was being towed to the scrap yards of Taiwan, it was floating for a while in one completely sealed lock of the Panama Canal. The Captain threw a spare aircraft engine overboard, and it sank to the bottom of the lock. What happened to the water level within the closed lock?", image: "", options: ["a. it increased", "b. it decreased", "c. it stayed the same", "d. it increased on the port side only", "e. it decreased at the stern end only"], answer: 1},
        {text: "14-34. A tug boar is towing an oil barge. You may consider the barge to be a large steel container, with an empty weight of 3,000 tons, completely filled with 50,000 tons of oil... An industrial saboteur lets oil leak out at a constant rate of one ton per second, and water flows in to keep the barge full. How long will the resulting oil slick be if a speed of ten kilometers per hour is maintained until the barge sinks?", image: "", options: ["a. 111", "b. 118", "c. 125", "d. 132", "e. 139"], answer: 1},
        {text: "14-35. A wooden cylinder of a uniform cross-sectional area floats vertically with part of its volume immersed in water and part of it in the layer of oil which is floating above the water (see the diagram). If the density of oil is 0.65 gm/cm3 and the dimensions of the cylinder are as shown in the diagram, calculate density of wood (in gm/cm3).", image: "14.35.png", options: ["a. 0.851", "b. 0.382", "c. 0.633", "d. 0.296", "e. 0.567"], answer: 4},
        {text: "14-36. Water (density = 1.0 x 10^3 kg/m3) flows through a horizontal pipe which narrows to one half of its original cross section. The waters speed at the constriction is 6.0 m/sec. By how much does the pressure drop from the original cross-section to the constriction? Answer in Pa.", image: "14.36.png", options: ["a. 1.35 x 10^4", "b. 9 x 10^3", "c. 1.8 x 10^4", "d. 2.25 x 10^3", "e. none of these"], answer: 0},
        {text: "14-37. Water is flowing at a steady rate through the horizontal pipe shown. At point B, the radius of the pipe is 20.0 cm, and the pressure in the pipe is 5.00 x 10^4 N/m2. At point C, the radius is 10.0 cm and the pressure is 4.00 x 10^4 N/m2. What is the rate of flow of water through the pipe in cubic meters per second?", image: "14.37.png", options: ["a. 0.145", "b. 0.255", "c. 0.311", "d. 0.560", "e. 1.07"], answer: 0},
        
        {text: "15-1. The period of an oscillation is 0.33 sec. The angular frequency of the oscillation (in sec-1) is:", image: "", options: ["a. 0.33π", "b. 0.66π", "c. 3/2π", "d. 6π", "e. 3.0"], answer: 3},
        {text: "15-2. A particle is in motion according to the equation y = (60 cm) cos (8t + π/8) where t is in seconds. Find the speed of the particle when it is at a point 20 cm from the equilibrium position. Answers in cm/s.", image: "", options: ["a. 453", "b. 56.6", "c. 320", "d. 142", "e. 480"], answer: 0},
        {text: "15-3. A 0.50 kg mass and a light spring of force constant 8.0 N/m vibrate in simple harmonic motion with an amplitude of 10 cm. Calculate the time in seconds that it takes for the mass to move from x = 0 to x = 8.0 cm...", image: "", options: ["a. 0.12", "b. 0.23", "c. 0.32", "d. 0.55", "e. 1.6"], answer: 1},
        {text: "15-4. A loudspeaker produces a musical sound by the simple harmonic oscillation of a diaphragm. If the amplitude of oscillation is limited to 1.0 x 10^-3 mm, what frequencies will result in the acceleration of the diaphragm exceeding g?", image: "", options: ["a. greater than 710 Hz", "b. less than 1500 Hz", "c. greater than 500 Hz", "d. greater than 2200 Hz", "e. less than 400 Hz"], answer: 2},
        {text: "15-5. A 5.0 kg block moves with simple harmonic motion back and forth along a straight track. The time for 12 complete cycles is 16 seconds. The length of the track section over which it moves is 16 cm. Calculate the maximum speed with which the block moves. Answer in m/s.", image: "", options: ["a. 0.50", "b. 0.06", "c. 0.75", "d. 0.38", "e. 0.27"], answer: 3},
        {text: "15-6. A light spring hangs from a ceiling with a mass m attached to the lower end. The mass oscillates with a period of 2.0 seconds. When an additional mass of 2.0 kg is attached to m the period changes to 3.0 seconds. Find the original mass m. Answers in kg.", image: "", options: ["a. 0.8", "b. 1.0", "c. 1.5", "d. 1.6", "e. 4.0"], answer: 3},
        {text: "15-7. An unstretched massless spring is 60 cm long and has a force constant of 49 N/m. The upper end is fastened to a hook, and the lower end is pulled down, stretching the spring by 40 cm... A 1.0 kg mass is then attached and released. What is the maximum speed? Answer in m/s.", image: "", options: ["a. 0.71", "b. 1.4", "c. 2.0", "d. 2.8", "e. 4.0"], answer: 1},
        {text: "15-8. A lab demonstrator hangs his lunch bucket from a vertical spring and measured the period for vertical oscillations as 3.0 seconds. He then hangs the same bucket from a different spring and measures a period of 4.0 seconds. Finally, he hooks the two springs together, one below the other... What period of oscillation should he find now?", image: "15.8.png", options: ["a. 1.7", "b. 3.5", "c. 4.6", "d. 5.0", "e. 7.0"], answer: 3},
        {text: "15-9. The numbers on a spring scale read from 0 to 12 kg over a distance of 9.8 cm. A dead fish suspended from the scale is found to oscillate vertically with a frequency of 3.0 Hz. What is the mass of the fish in kilograms?", image: "", options: ["a. 3.4", "b. 6.8", "c. 1.1", "d. 2.3", "e. 0.67"], answer: 0},
        {text: "15-10. A block sits on the top surface of a poston that moves vertically with simple harmonic motion of period 1/2 second. What is the maximum amplitude of the pistons motion so that the block will remain in contact with the piston? Answers in cm.", image: "15.10.png", options: ["a. 3.14", "b. 6.2", "c. 12.4", "d. 20", "e. 620"], answer: 1},
        {text: "15-11. A table moves horizontally with SHM of frequency 10.0 Hz. A 5 kg block lies on the table. The coefficient of static friction between the block and the table is 0.5, while the coefficient of kinetic friction is 0.25. What is the largest possible amplitude so that the block doesnt slip on the table?", image: "", options: ["a. 0.12 cm", "b. 7.8 cm", "c. 12 cm", "d. 78 cm", "e. 120 cm"], answer: 0},
        {text: "15-12. The 2-kg mass, attached to the 900 N.m spring, is displaced 3 cm from its equilibrium position, and released from rest at time t = 0. Find its position at time t = 5 s. (in cm)", image: "15.12.png", options: ["a. 3.00", "b. 2.20", "c. 0.97", "d. 0.83", "e. 2.18"], answer: 1},
        {text: "15-13. A spring mass system will oscillate with a frequency of 3.0 Hz. Determine the displacement in m as a function of time in sec. if the block is displace to x0 = +0.30 m and given a velocity v0 = –5.0 m/s at t = 0.", image: "15.13.png", options: ["a. 0.40 cos (6.0 πt – 0.85)", "b. 0.30 cos (3.0 πt + 2.3)", "c. 0.40 cos (6.0 πt + 0.85)", "d. 0.50 cos (6.0 πt – 2.3)", "e. 0.40 sin (6.0 πt + 2.3)"], answer: 4},
        {text: "15-14. Two blocks of mass m1 = 5.0 kg and m2 = 10.0 kg are arranged on a frictionless inclined plane as shown. The light spring has a force constant of 450 N/m... Find the frequency in Hz of the resulting simple harmonic motion.", image: "15.14.png", options: ["a. 6.71", "b. 5.48", "c. 3.05", "d. 1.07", "e. 0.872"], answer: 3},
        {text: "15-15. A 2.0 kg block M slides as shown on a frictionless track. It is constrained by four identical springs, connected as shown. Each spring has k = 5.0 N/m. Calculate the frequency of the simple harmonic motion. Answers in Hz.", image: "15.15.png", options: ["a. .40", "b. .25", "c. .50", "d. .65", "e. .90"], answer: 0},
        {text: "15-16. A mass and a light spring with force constant K = 150 Nm-1 undergo simple harmonic motion on a horizontal frictionless surface with an amplitude of 10.0 cm. Find the kinetic energy in J when the mass is 6.0 cm from equilibrium.", image: "", options: ["a. 1.50", "b. 0.12", "c. 0.75", "d. 0.27", "e. 0.48"], answer: 4},
        {text: "15-17. A mass m and a light spring with spring constant 50 N/m undergo simple harmonic motion on a horizontal frictionless surface with an amplitude of 12 cm. What is the kinetic energy in J when the mass is 9.0 cm from equilibrium?", image: "", options: ["a. 0.16", "b. 0.20", "c. 0.27", "d. 0.36", "e. 0.54"], answer: 0},
        {text: "15-18. A mass attached to a light spring executes simple harmonic motion with a period of 2.0 s. The spring constant is 1.5 N/m and the maximum kinetic energy of the system is 1.5 J. What is the maximum velocity attained by the particle?", image: "", options: ["a. 1.1", "b. 2.2", "c. 3.3", "d. 4.4", "e. 5.5"], answer: 3},
        {text: "15-19. When the displacement is two-thirds the amplitude, what fraction of the total energy of a simple harmonic oscillator is kinetic?", image: "", options: ["a. √3/2", "b. 1/√2", "c. 3/4", "d. 1/2", "e. 5/9"], answer: 4},
        {text: "15-20. A bullet of mass 0.010 kg and velocity v = 400 m/s is fired into a stationary block of mass 0.990 kg attached to a spring of force constant k = 100 N/m. If the bullet remains embedded in the block, how far will the spring be compressed from its equilibrium position before it starts to rebound?", image: "15.20.png", options: ["a. .16 m", "b. .20 m", "c. .25 m", "d. .40 m", "e. .50 m"], answer: 3},
        {text: "15-21. A simple pendulum of length 1.00 meters makes 100 complete oscillations in 204 sec. at a certain location. What is the acceleration due to gravity g at this point? Answers in n/sec2", image: "", options: ["a. 9.16", "b. 9.49", "c. 9.81", "d. 9.65", "e. 9.97"], answer: 1},
        {text: "15-22. A pendulum controlled grandfather clock designed for use on earth is taken to the surface of the moon, where the acceleration due to gravity is 1.67 m/s2. The clock indicates 12 oclock at noon. What time does it indicate three hours later?", image: "", options: ["a. 14 mins. after 1", "b. 16 mins. after 7", "c. 23 mins. before 6", "d. 29 mins. before 1", "e. 3 oclock"], answer: 0},
        {text: "15-23. A long simple pendulum hangs from our ivory tower. The light suspension rod is 25 m in length and the small mass is a 50 kg block of ice. Warmer weather causes the ice to decrease by 10% in mass and the rod to increase by 10% in length. How do these factors combine to change the period of the pendulum?", image: "", options: ["a. The period does not change", "b. The period increases by about 10%", "c. The period decreases by about 10%", "d. The period increases by about 5%", "e. The period decreases by about 5%"], answer: 3},
        {text: "15-24. A Lower Slobbovian terrorist made a time bomb and set it to explode after two hours of ticking. His clock used a simple pendulum; 64 cm of light string connecting a heavy bob B to a pivot P as shown. Unfortunately, a nail carelessly driven at N, 39 cm directly below P, changes the swing pattern... How long is it before the bomb explodes? Answers in minutes.", image: "15.24.png", options: ["a. 47", "b. 38", "c. 160", "d. 120", "e. 98"], answer: 4},
        {text: "15-25. On the moon, the astronauts observe that a mass M falls h m from rest in t sec. The frequency of a simple pendulum of length ℓ on the moon is given by", image: "15.25.png", options: ["a. (1/2)π √(h/tℓ)", "b. (1/πℓ) √(h/2ℓ)", "c. √(2h/πℓt)", "d. (h/πℓt) √(2/M)", "e. (1/2π) √(h/ℓ)"], answer: 1},
        {text: "15-26. Your professor suspends a thin rod of length L = 4.90 meters and mass m = 1.50 kg from a single nail by means of two light strings each of length L. Find the period for small angular oscillations of this system.", image: "15.26.png", options: ["a. 4.36", "b. 9.72", "c. 6.54", "d. 1.85", "e. 20.6"], answer: 0},
        {text: "15-27. Your professor hangs a uniform thin rod BC (M = 15 kg, L = 1.2 m) from a frictionless hook at the center of the ceiling. Two identical long springs (k = 35 N/m) are stretched horizontally... Calculate the period for small amplitude oscillations of the rod swinging about the point C. Answer in seconds.", image: "15.27.png", options: ["a. 0.87", "b. 1.01", "c. 1.23", "d. 1.43", "e. 3.11"], answer: 2},
        {text: "15-28. An irregular object is suspended from a thin wire, and performs torsional oscillations about a vertical axis along the wire. The period of oscillation is T1 = 7.805 s... What is the rotational inertia (moment of inertia) of the original object?", image: "15.28.png", options: ["a. 1.02 x 10^-5", "b. 1.02 x 10^-3", "c. 7.31 x 10^-4", "d. 6.21 x 10^-4", "e. 4.02 x 10^-4"], answer: 4},
        {text: "15-29. A torsional pendulum is formed by a rim-loaded bicycle wheel suspended from the ceiling by a wire. The radius is 0.350 m and its mass is 5.00 kg. The wheel undergoes angular oscillations of amplitude π/2.00... Find the torsional constant of the suspension wire.", image: "15.29.png", options: ["a. 2.15", "b. 9.80", "c. 19.6", "d. 24.8", "e. 37.2"], answer: 3},
        {text: "15-30. A massless straight rigid bar is free to swing about one end P as shown. A small object of mass 1.00 kg is attached 1.00 m below P and a second small object of unknown mass is attached 2.00 m below P... What is the unknown mass in kg?", image: "15.30.png", options: ["a. 3.10", "b. 2.32", "c. 1.55", "d. 1.16", "e. not enough data given"], answer: 2},
        {text: "15-31. A physics professor drives his motor bike along a straight level road at constant speed. He just misses two of his students sitting in a sports car... Calculate the shortest time interval in seconds before the car catches up to the bike.", image: "", options: ["a. 10", "b. 20", "c. 30", "d. 40", "e. 50"], answer: 1},
        {text: "15-32. The diagram shows two coplanar hoops, each of mass M and radius R, fixed together at P, and performing small oscillations about a frictionless axle which is normal to the plane of the hoops... Find the length of the equivalent simple pendulum.", image: "15.32.png", options: ["a. 2 R", "b. 3 R", "c. 4 R", "d. 5 R", "e. 6 R"], answer: 1},
        {text: "15-33. A long thin uniform rod of length L and mass m is free to rotate in a horizontal plane about a vertical axis through its center. Two springs with force constant k are connected horizontally... What is the period of small oscillations when the rod is pushed slightly to one side and released?", image: "15.33.png", options: ["a. T = 2π √(2m/3k)", "b. T = 2π √(3k/m)", "c. T = 2π √(m/6k)", "d. T = 2π √(4k/3m)", "e. T = 2π √(m/4k)"], answer: 2},
        {text: "15-34. A cylinder, weighted at its bottom, remains upright in equilibrium as it floats in water. It is then pushed down vertically by a distance D below its equilibrium position... Find the frequency of oscillation after it is released. Answer in Hz.", image: "15.34.png", options: ["a. 9.10", "b. 8.31", "c. 1.53", "d. 3.06", "e. 4.16"], answer: 2},
        {text: "15-35. A vertical U-tube of uniform area of cross-section A, is partly filled with a single, homogeneous liquid of density 1300 kg/m3. The total length of the liquid column is 12.0 cm... Find the angular frequency of vibration “ω” for the liquid mass, assuming that there is no friction.", image: "15.35.png", options: ["a. 6.40", "b. 12.8", "c. 16.0", "d. 163", "e. 3.14"], answer: 1},
        {text: "15-36. When the masses shown are set into vertical oscillation, it is observed that the 2 kg mass makes 5 oscillations in the same time as the 4 kg mass makes 4 oscillations. Find k1/k2, the ration of the spring constant.", image: "15.36.png", options: ["a. 0.32", "b. 0.55", "c. 0.78", "d. .128", "e. 1.60"], answer: 2},
        {text: "15-37. Three identical light springs are used to support the same block of mass M from a beam as shown. In case I, the three are connected in series... In case II, the three are connected in parallel... Calculate the frequency ratio, fI/fII, of vertical oscillations in the two cases.", image: "15.37.png", options: ["a. 9", "b. 3", "c. 1", "d. 1/3", "e. 1/9"], answer: 3},
        {text: "15-38. The balance wheel of a watch undergoes rotational simple harmonic motion with a amplitude of π/4.00 radians and a period of 0.500 s. Determine the maximum angular velocity of the wheel in radians per second.", image: "", options: ["a. 2.00", "b. 7.12", "c. 9.87", "d. 11.5", "e. 12.6"], answer: 2},
    
        {text: "16-1. Snoopy is flying his radar equipped World War I aeroplane at constant speed in level flight over a level enemy battle field... Calculate the speed of his plane over the ground. Answers in m/s.", image: "16.1.png", options: ["a. 4.2", "b. 8.3", "c. 16", "d. 24", "e. 32"], answer: 1},
        {text: "16-2. A student carries a small radio receiver which receives a radio signal from a transmitter located a few miles due north... What is a reasonably good estimate of the broadcasting frequency of the radio transmitter? (in Hz)", image: "", options: ["a. 3.2 x 10^7", "b. 2.1 x 10^6", "c. 1.6 x 10^7", "d. 1.1 x 10^10", "e. 8.3 x 10^6"], answer: 4},
        {text: "16-3. Write an equation in SI units for a wave traveling in the negative direction along the x-axis and having a amplitude of 10 cm, a frequency of 125 Hz, and a speed of 250 m/sec.", image: "", options: ["a. y = 0.1 sin", "b. y = 0.1 sin π(x + 250t)", "c. y = 10 sin π(x + 250t)", "d. y = 0.1 sin 2π(x + 250t)", "e. none of these"], answer: 1},
        {text: "16-4. A continuous sinusoidal wave is traveling along a string with a velocity of 2.0 m/s. The displacement of the particles at t = 1.0 second is found to vary according to the equation y = [1.00 m] sin [(2π m-1)x – π]. What is the frequency of the wave in Hz?", image: "", options: ["a. π", "b. 0.5", "c. 2.0", "d. 0.5π", "e. π/4"], answer: 2},
        {text: "16-5. A transverse wave travels along a string according to the equation y(x, t) = 0.05 sin (0.4 πx + 3 πt + π/3). (x, y in m, t in s). What is the speed of propagation of the wave, in m/s?", image: "", options: ["a. 1.2", "b. 4.0", "c. 7.5", "d. 9.0", "e. 12.0"], answer: 2},
        {text: "16-6. A harmonic wave train is described by y (x, y) = 0.0300 sin [π(x – vt )] where x and y are in meters, t is in seconds and v in meters per second. At a certain time and position the transverse displacement is y = 0.0200 m and the transverse velocity is 9.80 ms-1. What is the wave speed, v in meters per second.", image: "", options: ["a. 80", "b. 100", "c. 120", "d. 140", "e. 160"], answer: 3},
        {text: "16-7. A wave in a string is described by y = 2 sin (π/18) (x – 48t) where x and y are in cm and t is in seconds. What is the transverse velocity in cm/sec at x = 27 cm when t = 0.25 sec?", image: "", options: ["a. 16.8", "b. 8.4", "c. 4.6", "d. 8.4", "e. 14.5"], answer: 1},
        {text: "16-8. A longitudinal wave has a displacement given by y = 2.0 x 10^-2 (m) cos (300x + 10^-2t + 8.0) Determine the velocity of this wave in m/s.", image: "", options: ["a. 3.0 x 10^4", "b. +3.0 x 10^4", "c. +3.3 x 10^-5", "d. 3.3 x 10^-5", "e. 2.0 x 10^-4"], answer: 3},
        {text: "16-9. A continuous sinusoidal transverse wave is traveling on a string. The maximum transverse speed of the string is 10% of the propagation speed of the wave. What is the maximum transverse displacement, in terms of the wave length of the wave?", image: "", options: ["a. λ/20π", "b. λ/10", "c. πλ/5", "d. 5λ/π", "e. 10λ"], answer: 3},
        {text: "16-10. A traveling transverse wave in a string is given by the equation y = 0.3 sin (πx/12 – 50 πt + ф) where y, x are in cm and t is in sec. At x = 0 and t = 0, y has a value of 0.2 cm and the transverse velocity is in the positive y direction. What is the phase constant ф, in radians?", image: "", options: ["a. 15.0π", "b. 0.025π", "c. 2.41", "d. 0.730", "e. –4.17"], answer: 2},
        {text: "16-11. A transverse wave on a string is given by: y = 0.5 sin (4.0x – 300t) when x and y are in cm and t is in seconds. What is the value of the maximum transverse particle speed divided by the speed of the wave?", image: "", options: ["a. 2", "b. 1/2", "c. 4", "d. 600", "e. none of the other answers"], answer: 0},
        {text: "16-12. A wave in a string having a tension of 300 N is described by its transverse displacement function given below. y (x, t) = (0.08 m) sin (3.5x - 754t + 1.49). What is the mass/unit length of the string? Answer in grams per meter.", image: "", options: ["a. 6.46", "b. 15.4", "c. 4.64", "d. 11.6", "e. 60.3"], answer: 0},
        {text: "16-13. A transverse simple harmonic wave has a period of 50.0 x 10^-3 s and travels in the negative x direction with a speed of 20.0 m/s. At t = 0 the particle on the string at x = 0 has a displacement of +2.00 cm and a velocity of 2.00 cm/s. Determine the amplitude of the wave in cm.", image: "", options: ["a. 1.59", "b. 2.00", "c. 2.20", "d. 2.56", "e. 3.14"], answer: 3},
        {text: "16-14. Two ropes of equal length are tied together and the ends are attached to two rigid walls as shown. The lighter rope has a mass of 0.020 kg and the heavy rope has a mass of 0.050 kg. A wave of wave length λ = 1.00 m is traveling along the light rope as shown. What will be its wave length in the heavy rope?", image: "16.14.png", options: ["a. 1.00 m", "b. 0.400 m", "c. 2.50 m", "d. 1.58 m", "e. 0.632 m"], answer: 4},
        {text: "16-15. Transverse wave with a speed of 40.0 m/s are to be produced in a 4.00 m length of string with a total mass of 0.060 kg. What tension in Newtons is required in the string?", image: "", options: ["a. 0.600", "b. 24.0", "c. 96.0", "d. 480", "e. 107,000"], answer: 1},
        {text: "16-16. Two identical strings (same lengths and densities) are fixed at each end and stretched under different tensions. Determine the ratio of the tensions which will give the same resonant frequency when one string vibrates in two loops and the other string vibrates in three loops.", image: "", options: ["a. 1.22", "b. 1.50", "c. 2.00", "d. 2.25", "e. 4.00"], answer: 3},
        {text: "16-17. A copper wire of length 5.00 m is under tension of 750 N. For what frequency will three antinodes (loops) appear when standing waves are generated in the wire? The total mass of the wire is 60.0 grams. Give answer in Hz.", image: "", options: ["a. 37.5", "b. 33.5", "c. 75.0", "d. 150", "e. none of these"], answer: 2},
        {text: "16-18. A solar powered clothes dryer consists of a 15 m long horizontal rope stretched tightly between two trees. On a windy day, the rope vibrates in a standing wave pattern with a node at each end and two more nodes along its length. It hums a note of frequency 75 Hz and the tension in the rope is 1500 N. Calculate the mass of the rope in grams.", image: "", options: ["a. 25", "b. 30", "c. 40", "d. 50", "e. 80"], answer: 2},
        {text: "16-19. A thin steel cable arranged as shown can be set into resonance using loudspeaker S. S is varied continuously in the range from 350 to 550 Hz and only two resonant frequencies are found at 400 Hz and 500 Hz. If the mass of the horizontal part of the cable is 50 gm, find the value of M in kg.", image: "16.19.png", options: ["a. 6.4 x 10^3", "b. 6.3 x 10^4", "c. 1.0 x 10^4", "d. 1.6 x 10^4", "e. 1.0 x 10^3"], answer: 4},
        {text: "16-20. A string vibrates according to the equation y = (1.0 m) [sin (π/4 m-1)x] cos (2π s-1)t which is the superposition of two identical waves moving in opposite direction. What is the speed of propagation of the individual wave train moving to the left? Answer in m/s.", image: "", options: ["a. 2.0", "b. 0.5", "c. 1.0", "d. 8.0", "e. 0.25"], answer: 3},
        {text: "16-21. A standing wave on a wire is described by y = 0.01 sin (4πx) cos (300πt) [y, x in m, t in s] If the linear density of the wire is 16 g/m, what is the tension in the wire, in N?", image: "", options: ["a. 1.2", "b. 9.0", "c. 24", "d. 90", "e. 120"], answer: 3},
        {text: "16-22. A standing wave in a particular string can be described by the equation y = 5 sin (πx/3) cos (40πt) where x and y are in cm and t is sec. The amplitude of the two component waves that can give this result is:", image: "", options: ["a. 2.5 cm", "b. 5/√2 cm", "c. 5 cm", "d. 10 cm", "e. none of these"], answer: 0},
        {text: "16-23. A longitudinal standing wave pattern in a stretched spring is described by its longitudinal displacement function S(x. t) = (6.7 cm) sin (8.4x + 1.4) cos (940t) where x and t are in meters and seconds, and S is a displacement in the positive x direction. Calculate the distance between adjacent modal points. Answer in m.", image: "", options: ["a. 0.37", "b. 1.4", "c. 0.75", "d. 2.6", "e. 4.2"], answer: 0},
        {text: "16-24. A stretched string has a total mass M. The tension in the string is one-hundred times the weight of the string. A wave pulse travels the length of the string from extreme left to extreme right in 0.200 seconds. What is the length of the string? Answers in m.", image: "", options: ["a. 39.2", "b. 4.00", "c. 20.0", "d. 0.020", "e. 196"], answer: 0},
        {text: "16-25. A string vibrates according to the equation y = 0.6 sin (πx/4) cos 3πt where x and y are in cm and t is in seconds. What is the transverse speed of a particle at the position x = 1.0 cm and the time t = 3/4 sec? Answers in cm/s.", image: "", options: ["a. 0.74π", "b. 2.83", "c. π/2", "d. 1.8π", "e. 0.60"], answer: 1},
        {text: "16-26. Three pieces of string of mass density 5 g/m are tied and stretched in the pattern shown, with lengths marked in meters. A small transverse pulse is started at A... Calculate the time for a pulse to reach C from A. Answer in seconds.", image: "16.26.png", options: ["a. 4.1 x 10^-2", "b. 9.4 x 10^-2", "c. 6.1 x 10^-2", "d. 8.3 x 10^-2", "e. 1.0 x 10^-3"], answer: 3},
        {text: "16-27. A string has a tension of 20 N and mass density of 5 g/m. A wave of frequency 100 Hz and amplitude 1 cm travels along the string. Calculate the average energy per meter of string.", image: "", options: ["a. 10^-3", "b. 5 x 10^-2", "c. 10^-2", "d. 5 x 10^-1", "e. 10^-1"], answer: 4},
        {text: "16-28. Two spherical sound waves of the same frequency 165 Hz are emitted in phase by two separate sources. The waves travel in air at a speed of 330 m/s. What is the phase difference between the two waves at a point which is 5.40 m from one source and 5.00 m from the other? Answer in radians.", image: "16.28.png", options: ["a. 0.20", "b. 0.63", "c. 0.80", "d. 1.26", "e. 3.14"], answer: 3},
        {text: "16-29. Helga Hertz has two boyfriends. She communicates with them regularly on short-wave radio... What phase difference should she use to keep Siegfried from hearing when she talks to Orville?", image: "16.29.png", options: ["a. 83", "b. 97", "c. 116", "d. 64", "e. 40"], answer: 3},
        {text: "16-30. A police cruiser has an unusual radar speed trap set up... If the time interval between successive quiet sports is 1/5 second as he crosses the main road, what is his speed? Answers in m/sec.", image: "", options: ["a. 25", "b. 50", "c. 75", "d. 40", "e. 20"], answer: 0},
        {text: "16-31. A source S and a detector D of high frequency sound waves are a distance 6.0 ft. apart on the ground... How much higher must the plate be moved to next obtain a maximum at the detector D? Answers in feet.", image: "16.31.png", options: ["a. 2.3", "b. 7.0", "c. 2.0", "d. 1.2", "e. 1.0"], answer: 3},
    
        {text: "17-1. A pipe open at both ends joins two rooms. It is 5 cm in diameter and 1.5 meters long. The number of resonances that occur in the frequency range between 100 Hz and 1000 Hz is: (use sound velocity c = 330 m/sec).", image: "", options: ["a. 1", "b. 3", "c. 5", "d. 7", "e. 9"], answer: 4},
        {text: "17-2. An organ pipe with both ends open has a second harmonic frequency of 880 Hz. Some engineers, after a night on the town, decide to torment the organist by closing one end of the pipe. Calculate the third harmonic frequency of the modified pipe.", image: "", options: ["a. 440", "b. 660", "c. 880", "d. 1320", "e. 1760"], answer: 1},
        {text: "17-3. The loudspeaker shown is adjusted to cause the pipe to resonate in its fundamental mode. The pipe is open at both ends and the speed of sound in the air inside the pipe is 340 m/s. Find the frequency of the sound generated in the pipe. Answers in Hz.", image: "17.3.png", options: ["a. 1000", "b. 500", "c. 250", "d. 25", "e. 5.0"], answer: 1},
        {text: "17-4. The 75 meter tall University smoke stack is a long column full of flue gas closed at the bottom and open at the top. A physics student notes that nine small smoke rings leave the top every five seconds. Calculate the speed of sound in the flue gas.", image: "", options: ["a. 540 m/s", "b. 450 m/s", "c. 340 m/s", "d. 270 m/s", "e. 180 m/s"], answer: 0},
        {text: "17-5. A student is playing with a long air filled pipe closed at the far end and open at the near end. She observes resonant frequencies at 60 Hz and at 100 Hz, with none between. Using 330 m/s as the speed of sound in the air, calculate the length of the pipe. Answer in m.", image: "", options: ["a. 1.1", "b. 5.1", "c. 3.1", "d. 4.1", "e. 2.1"], answer: 3},
        {text: "17--6. The lowest frequency note of an organ pipe with both ends open corresponds to middle C (262 Hz). The second lowest note of another organ pipe closed at one end has the same frequency. Find the ratio of the two lengths ℓ(closed)/ℓ(open).", image: "", options: ["a. 2.00", "b. 1.50", "c. 1.33", "d. 0.75", "e. 0.67"], answer: 1},
        {text: "17-7. As an industrial spy on a distant planet, you found the following test information on an organ pipe. Two adjacent resonant frequencies were 210 Hz and 294 Hz... What was the lowest possible resonant frequency of sound waves in the pipe?", image: "", options: ["a. 242 Hz", "b. 84 Hz", "c. Both d and e are true.", "d. The solution is not possible without knowing the speed of sound in the atmosphere of the unknown planet.", "e. The solution is not possible without knowing the condition of the other end of the pipe."], answer: 0},
        {text: "17-8. A student drives a fast sports car along University Avenue at 44 m/s. Her physics professor follows on his motor bike at 11 m/s. She honks her horn and he hears a frequency of 650 Hz. What frequency would he hear if she honked the horn when both vehicles were stopped?", image: "", options: ["a. 777", "b. 713", "c. 675", "d. 650", "e. 593"], answer: 1},
        {text: "17-9. On a straight stretch of track the caboose becomes detached from the rear end of a train. The dean is in the caboose and, when the caboose has slowed to 60 km/hr, he blows a warning whistle at a frequency of 1000 Hz. What frequency is heard by the passengers in the main part of the train which is still traveling at 100 km/hr?", image: "", options: ["a. 875", "b. 966", "c. 1030", "d. 1090", "e. 1140"], answer: 0},
        {text: "17--10. A sound source of frequency moves at one-quarter the speed of sound away from a stationary observer, who then hears a frequency of:", image: "", options: ["a. 3/5", "b. 3/4", "c. 4/5", "d. 5/4", "e. 4/3"], answer: 2},
        {text: "17-11. A bat is flying horizontally, straight towards a flat, smooth, vertical wall at a constant speed of 1/40 of the speed of sound in air. She emits a sound of frequency 39,000 Hz. What frequency does the bat hear reflected from the wall? Answers in Hz.", image: "", options: ["a. 39,975", "b. 40,000", "c. 40,974", "d. 41,000", "e. 41,026"], answer: 3},
        {text: "17-12. An artsman is riding his bicycle toward a large vertical wall at a constant speed of 18.0 km/hr. He honks his 200 Hz horn furiously in the hope that the wall will move out of his way. Before the crash, what beat frequency would the artsman hear due to the combination of the direct and the reflected sounds?", image: "", options: ["a. 7.0", "b. 6.8", "c. 6.6", "d. 6.4", "e. 6.2"], answer: 1},
        {text: "17-13. James Bond blows his whistle to warn his companion, Molly, of danger. Molly is between James and a tall cliff so she hears both direct and reflected sound. James is rushing towards Molly at 20 m/s and she is rushing towards him at the same speed. What is the beat frequency between the direct and reflected sound as heard by Molly if the whistle has a frequency of 1000 Hz?", image: "", options: ["a. 0", "b. 55", "c. 65", "d. 110", "e. 125"], answer: 4},
        {text: "17-14. Two trains are approaching each other on adjacent parallel tracks, traveling at speeds of 100 and 120 km/hr. The faster train is blowing its whistle with a frequency of 400 Hz. What will be the change in frequency heard by the driver of the other train as they pass each other?", image: "", options: ["a. From 400 Hz to 333 Hz", "b. From 482 Hz to 333 Hz", "c. From 333 Hz to 482 Hz", "d. From 363 Hz to 433 Hz", "e. From 445 Hz to 355 Hz"], answer: 1},
        {text: "17-15. A 1000 Hz source of sound moves east at 20.0 m/s and an observer moves west along the same line at 10.0 m/s. There is a wind blowing from east to west at 15.0 m/s. What frequency is detected by the observer when he is east of the source?", image: "17.15.png", options: ["a. 970", "b. 1031", "c. 1092", "d. 1102", "e. 1136"], answer: 3},
        {text: "17-16. A sound source with frequency 100 Hz is at A moving to the right at 20 m/s. A listener at B moves to the left at 10 m/s. A vertical reflecting surface at C moves left at 20 m/s. What beat frequency is detected by B between the direct sound from A and that reflected from C?", image: "", options: ["a. 3.1", "b. 3.5", "c. 6.5", "d. 8.3", "e. 120"], answer: 2},
        {text: "17-17. Wonder woman starts the Batmobile from rest and drives straight away from Robin with a constant acceleration of 25 m/s2... Calculate how far away Wonder woman is when Robin hears the exhaust frequency down one octave to 220 Hz. Answer in km.", image: "", options: ["a. 1.6", "b. 2.3", "c. 3.7", "d. 4.5", "e. 5.2"], answer: 4},
        {text: "17-18. An organ pipe open at both ends has as its three lowest resonant frequencies 200, 400, 600 Hz. If one end is closed, the three lowest resonant frequencies become:", image: "", options: ["a. 200, 400, 600 Hz", "b. 400, 800, 1200 Hz", "c. 100, 200, 300 Hz", "d. 100, 300, 500 Hz", "e. 150, 300, 450 Hz"], answer: 3},
        {text: "17-19. Two identical piano wires stretched with the same tension have a fundamental frequency of 400 Hz. By what fractional amount must the tension in one wire be increased in order that 4 beats/sec should occur when both wires vibrate simultaneously?", image: "", options: ["a. 1%", "b. 2%", "c. 4%", "d. 8%", "e. none of these"], answer: 1},
        {text: "17-20. When a horn of frequency 120 Hz is approaching an observer at 85 m/sec, or one-quarter the speed of sound, then what is the frequency heard by the observer?", image: "", options: ["a. 160 Hz", "b. 150 Hz", "c. 120 Hz", "d. 90 Hz", "e. 80 Hz"], answer: 0},
        {text: "17-21. A standing wave with a wavelength of L is established across a room of width L. A meter is used to measure the sound pressure level. The pressure is:", image: "", options: ["a. high near the walls and low in the center of the room", "b. low near the walls and high in the center of the room", "c. low near the walls and low in the center of the room", "d. high near the walls and high in the center of the room", "e. uniform throughout the room"], answer: 3},
        {text: "17-22. An observer at ground level sees an aircraft directly overhead, but at the same time the engine noise appears to originate from a point 20 behind the aircraft. Assuming no wind and that the aircraft is in level flight, find its speed in m/s.", image: "", options: ["a. 965", "b. 426", "c. 310", "d. 120", "e. 113"], answer: 4},
        {text: "17-23. Snoopy, a dog, sits in a tree 3 m above ground level and howls at the moon... Calculate the lowest frequency at which Charlie hears a relative minimum in sound level. Answers in Hz.", image: "", options: ["a. 430", "b. 340", "c. 170", "d. 85", "e. 42"], answer: 3},
        {text: "17-24. The decibel measure of sound is proportional to:", image: "", options: ["a. the loudness", "b. the sound power", "c. the power ratio with a reference", "d. the logarithm of the sound power", "e. the logarithm of the power ratio with a reference"], answer: 4},
        {text: "17-25. A fire alarm produces 95 dB of sound at 10 meters from the alarm. How much sound will be produced at 40 meters assuming that the sound waves spread out uniformly in all directions?", image: "", options: ["a. 92 dB", "b. 89 dB", "c. 86 dB", "d. 83 dB", "e. 80 dB"], answer: 3},
        {text: "17--26. If you increase the sound level of an amplifier from 73 dB to 92 dB, the power from the amplifier:", image: "", options: ["a. has been increased by a factor of 100", "b. is twice as loud", "c. is far too great for most amplifiers", "d. has gone up by a factor of 20", "e. has increased only a small amount"], answer: 0},
        {text: "17-27. A student sits in the park measuring sound levels using the standard decibel scale. A nearby radio, playing alone, produces a sound level of 65 dB. Another radio, tuned to a different station, produces 70 dB by itself. What sound level would be measured when both radios were on together? Answer in dB.", image: "", options: ["a. 71", "b. 72", "c. 73", "d. 74", "e. 75"], answer: 0},
        {text: "17-28. Calculate the sound intensity ratio (I drill/I conversation) for a pneumatic drill at 3 m (90 dB) compared to normal conversation at 1 m (60 dB).", image: "", options: ["a. 1.5", "b. 10^3", "c. 0.67", "d. 10^30", "e. 110^-3"], answer: 1},
        {text: "17-29. At a distance of 50 m from a jet fighter which is in the process of takeoff, the sound level is 120 dB. What is the sound level at a distance of 200 m? Assume the jet is a point source of sound. Answer in decibels.", image: "", options: ["a. 122", "b. 110", "c. 89.2", "d. 96", "e. 108"], answer: 4},
        {text: "17-30. What is the smallest number of 9.0 watt independent noise sources that must be placed on a circle of radius 2.0 m, in order to exceed the sound level of pain (120 dB) at the center of the circle?", image: "", options: ["a. 2", "b. 4", "c. 6", "d. 8", "e. 10"], answer: 2},
        {text: "17-31. Snoopy, a dog with excellent hearing, walks slowly along a straight path which we may call the x-axis... He records one minimum level at x = 5.5 m and the next minimum exactly 2 m further out... See if you can duplicate his result. Answers in Hz (cycles per second).", image: "", options: ["a. 170", "b. 340", "c. 510", "d. 940", "e. 1900"], answer: 3},

        {text: "18-1. In constructing a thermometer it is NECESSARY to use a thermometric substance that:", image: "", options: ["a. expands with rising temperature", "b. expands linearly with rising temperature", "c. will not freeze", "d. will not boil", "e. undergoes some change when heated or cooled"], answer: 4},
        {text: "18-2. The Celsius and Fahrenheit temperature systems agree in the:", image: "", options: ["a. size of their degree", "b. manner in which their fixed points are determined", "c. location of their zero points", "d. location of their 20 points", "e. temperature reading they give for liquid nitrogen"], answer: 1},
        {text: "18-3. There is a temperature at which the reading on the Kelvin scale is numerically:", image: "", options: ["a. equal to that on the Celsius scale", "b. lower than that on the Celsius scale", "c. equal to that on the Fahrenheit scale", "d. less than zero", "e. none of the above"], answer: 4},
        {text: "18-4. Which one of the following statements is true?", image: "", options: ["a. temperatures differing by 25 on the Fahrenheit scale must differ by 45 on the Celsius scale", "b. 40 K corresponds to 40℃", "c. temperatures which differ by 10º on the Celsius scale must differ by 18º on the Fahrenheit scale", "d. water at 90℃ is warmer than water at 202℉", "e. 0 SF corresponds to –32℃"], answer: 2},
        {text: "18-5. The two metallic strips that constitute some thermostats must differ in:", image: "", options: ["a. length", "b. thickness", "c. mass", "d. rate at which they conduct heat", "e. coefficient of linear expansion"], answer: 4},
        {text: "18-6. An annular ring is cut from an aluminum sheet. When this ring is heated:", image: "", options: ["a. the aluminum expands outward and the hole remains the same in size", "b. the hole decreases in diameter", "c. the area of the hole expands the same percent as any area of the aluminum", "d. the area of the hole expands a greater percent than any area of the aluminum", "e. linear expansion forces the shape of the hole to be slightly elliptical"], answer: 2},
        {text: "18-7. When the temperature of a copper disk is increased by 100℃, its diameter increases by 0.17 %. The area of each face increases by:", image: "", options: ["a. 0.17 %", "b. 0.34 %", "c. 0.51 %", "d. 0.13 %", "e. 0.27 %"], answer: 1},
        {text: "18-8. The coefficient of linear expansion of iron is 10^-5 per ℃. The volume of an iron cube, 5 cm on edge, will increase by what amount if it is heated from 10℃ to 60℃? Answer in cm3.", image: "", options: ["a. 0.00375", "b. 0.1875", "c. 0.0225", "d. 0.00125", "e. 0.0625"], answer: 1},
        {text: "18-9. Thin strips of iron and zinc are riveted together to form a bimetallic strip which bends when heated. The iron is on the inside of the bend because:", image: "", options: ["a. it has a higher coefficient of linear expansion", "b. it has a lower coefficient of linear expansion", "c. it has a higher specific heat", "d. it has a lower specific heat", "e. it conducts heat better"], answer: 1},
        {text: "18-10. It is more difficult to measure the coefficient of expansion of a liquid than a solid because:", image: "", options: ["a. no relation exists between linear and volume expansion coefficients", "b. a liquid tends to evaporate", "c. a liquid expands too much when heated", "d. a liquid expands too little when heated", "e. the containing vessel also expands"], answer: 4},
        {text: "18-11. The figure shows a rectangular brass plate at 0℃ in which there is cut a rectangular hole of dimension indicated. If the temperature of the plate is raised to 150℃:", image: "18.11.png", options: ["a. x will increase and y will decrease", "b. both x and y will decrease", "c. x will decrease and y will increase", "d. both x and y will increase", "e. depends on the dimension z"], answer: 3},
        {text: "18-12. The Stanford linear accelerator contains hundreds of brass discs tightly fitted into a steel tube (see figure). The coefficient of linear expansion of the brass is 2.00 x 10^-5 per ℃... If the diameter of a disc is 80.00 mm at 43℃, what is its diameter (mm) in the dry ice (–57℃)?", image: "18.12.png", options: ["a. 78.40", "b. 79.68", "c. 80.16", "d. 79.84", "e. none of these"], answer: 3},
        {text: "18-13. A surveyor’s 100 ft steel tape is correct at 68℉. On a hot day the tape has expanded to 100.02 ft. On that day, the tape indicates a distance of 46.57 ft between two points. What is the true distance between these points. Answer in ft.", image: "", options: ["a. 46.59", "b. 46.58", "c. 46.57", "d. 46.56", "e. 46.55"], answer: 3},
        {text: "18-14. The coefficient of expansion of a certain steel is 0.000012 per ℃. The coefficient of volume expansion, in (℃)-1, is:", image: "", options: ["a. (0.000012)^3", "b. (4π/3) (0.000012)^3", "c. 3 × 0.000012", "d. 0.000012", "e. depends on the shape of the volume to which it will be applied"], answer: 2},
        {text: "18-15. Possible units for the coefficient of volume expansion are:", image: "", options: ["a. mm/℃", "b. mm3/℃", "c. (℃)^3", "d. 1/(℃)^3", "e. 1/(℃)"], answer: 4},
        {text: "18-16. An air bubble doubles in volume as it rises from the bottom of a lake. Ignoring any temperature changes, estimate the depth of the lake. Answer in m.", image: "", options: ["a. 20", "b. 10", "c. 200", "d. 100", "e. 50"], answer: 1},
        {text: "18-17. Air enters a hot-air furnace at 70℃ and leaves at 77℃. Each entering cubic meter of air expands to what volume? Answer in m3.", image: "", options: ["a. 0.8", "b. 1.25", "c. 1.91", "d. 7", "e. 11"], answer: 1},
        {text: "18-18. A sample of an ideal gas is compressed by a piston from 10 m3 to 5 m3 and simultaneously cooled from 273℃ to 0℃. As a result there is:", image: "", options: ["a. an increase in pressure", "b. a decrease in pressure", "c. a decrease in density", "d. no change in volume", "e. an increase in density"], answer: 4},
        {text: "18-19. Two identical rooms in a house are connected by an open doorway. The temperatures in the two rooms are maintained at different values. Which room contains the greater mass of air?", image: "", options: ["a. room with higher temperature", "b. room with lower temperature", "c. room with higher pressure", "d. neither because both have the same pressure", "e. neither because both have the same volume"], answer: 1},
        {text: "18-20. 273 cm3 of an ideal gas is at 0℃. It is heated at constant pressure to 10℃. It will now occupy what volume? Answer in cm3.", image: "", options: ["a. 263", "b. 273", "c. 283", "d. 278", "e. 293"], answer: 2},
        {text: "18-21. An automobile tire is pumped up to a gauge pressure of 2.0 atm when the temperature is 27℃. What is its gauge pressure after the car has been running on a hot day so that the tire temperature is 77℃? Assume that the volume remains fixed.", image: "", options: ["a. 5.7 atm", "b. 3.5 atm", "c. 2.5 atm", "d. 2.3 atm", "e. 2.0 atm"], answer: 2},
        {text: "18-22. Estimate the number of air molecules in a 1 m3 volume at room temperature and atmospheric pressure.", image: "", options: ["a. 10^25", "b. 10^20", "c. 10^15", "d. 10^30", "e. 10^46"], answer: 0},
        {text: "18-23. A weather balloon is loosely filled with 2 m3 of helium at 1 atm at 27℃. At an elevation of 7000 m the atmospheric pressure is down to 0.5 atm... If the temperature at this elevation is –48℃, the gas volume (in m3) is:", image: "", options: ["a. 3", "b. 4", "c. 2", "d. 2.5", "e. 5.3"], answer: 0},
        {text: "18-24. Oxygen (molecular wt = 32) occupies a volume of 12 liters when its temperature is 20℃ and its pressure is 1 atm. Calculate the number of grams of oxygen.", image: "", options: ["a. 6.4", "b. 10.7", "c. 16", "d. 32", "e. 64"], answer: 2},
    
        {text: "19-1. The “heat capacity” of an object is:", image: "", options: ["a. the amount of heat energy to raise its temperature by 1℃", "b. the amount of heat energy to change its state without changing its temperature", "c. the amount of heat energy per kilogram to raise its temperature by 1℃", "d. the ratio of its specific heat to that of water", "e. the change in its temperature caused by adding 1 J of heat energy"], answer: 0},
        {text: "19-2. The “specific heat” of an object is:", image: "", options: ["a. the amount of heat energy to change the state of one kg of the substance", "b. the amount of heat energy emitted by oxidizing one kg of the substance", "c. the amount of heat energy to raise one kg of the substance from its freezing to its boiling point", "d. the amount of heat energy to raise one kg of the substance by 1℃", "e. the temperature of the object divided by its mass"], answer: 3},
        {text: "19-3. Fifty grams of ice at 0℃ is placed in a thermos bottle containing one hundred grams of water at 6℃. How many grams of ice will melt?", image: "", options: ["a. 7.5", "b. 2.0", "c. 8.3", "d. 17", "e. 50"], answer: 0},
        {text: "19-4. The specific heat of lead is 126 J/kg℃. 300 grams of lead shot at 100℃ is mixed with 100 grams of water at 70℃ in an insulated container. The final temperature of the mixture is:", image: "", options: ["a. 100℃", "b. 85.5℃", "c. 79.5℃", "d. 74.5℃", "e. 72.5℃"], answer: 4},
        {text: "19-5. A certain humidifier operates by raising water to the boiling point and then evaporating it. Every minute 30 grams of water at 20℃ are added to replace the 30 grams which are evaporated. The heat of fusion of water is 334 J/gm and the heat of vaporization is 2260 J/gm. How much power does this humidifier require?", image: "", options: ["a. 1.3 kw", "b. 330 w", "c. 22 w", "d. 680 w", "e. 1.8 kw"], answer: 0},
        {text: "19-6. Ten grams of ice at –20℃ is to be changed to steam at 130℃. The specific heat of both ice and steam is 0.5 cal/gm℃. The heat of fusion is 80 cal/gm and the heat of vaporization is 540 cal/gm. The entire process requires:", image: "", options: ["a. 750 cal", "b. 1250 cal", "c. 6950 cal", "d. 7450 cal", "e. 7700 cal"], answer: 3},
        {text: "19-7. A metal sample of mass M requires a power input P to just remain molten. When the heater is turned off, the metal solidifies in a time T. The specific latent heat of fusion of this metal is:", image: "", options: ["a. P/MT", "b. T/PM", "c. PM/T", "d. PMT", "e. PT/M"], answer: 4},
        {text: "19-8. Sir Isaac Newton amused himself and his bride on their honeymoon trip by measuring the change in water temperature between the top and bottom of several European waterfalls... maximum temperature rise he would expect at Niagara Falls? Take the height as 60 meters... Answers given in centigrade degrees.", image: "", options: ["a. 1.9", "b. 1.3", "c. 0.17", "d. 0.14", "e. 0.021"], answer: 3},
        {text: "19-9. Take the mechanical equivalent of heat as 4.2 J/cal. A 10 gram bullet moving at 2000 m/s plunges into 1 kg of wax (specific heat 0.7 cal/gm℃). The wax was initially at 20℃. Assuming that all the bullet’s energy heats the wax, its final temperature (℃) is:", image: "", options: ["a. 20.1", "b. 21.7", "c. 23.4", "d. 26.8", "e. 29.4"], answer: 3},
        {text: "19-10. Two different samples have the same mass and temperature. Equal quantities of heat are added to each. Their final temperatures may be different because the samples have different:", image: "", options: ["a. thermal conductivity", "b. coefficient of expansion", "c. density", "d. volume", "e. specific heat capacity"], answer: 4},
        {text: "19-11. A quantity of an ideal gas is compressed to half its initial volume. The process may be adiabatic, isothermal or isobaric. The greatest amount of work is required if the process is:", image: "", options: ["a. adiabatic", "b. isothermal", "c. isobaric", "d. adiabatic or isothermal (both require the same work; isobaric requires less)", "e. isothermal or isobaric (both require the same work; adiabatic requires less)"], answer: 0},
        {text: "19--12. A system undergoes an adiabatic process in which its internal energy increases by 30 J. Which entry in the table below is correct?", image: "", options: ["a. heat: none, work: 30 J on system", "b. heat: none, work: 30 J by system", "c. heat: 30 J removed, work: none", "d. heat: 30 J added, work: none", "e. heat: 60 J added, work: none"], answer: 0},
        {text: "19-13. A real gas undergoes a process which can be represented as a curve on a pV diagram. The work done by the gas during this process is:", image: "", options: ["a. pV", "b. p(V2 - V1)", "c. (p2 - p1)V", "d. ∫pdV", "e. Vdp"], answer: 3},
        {text: "19-14. An isothermal process for an ideal gas is represented on a pV diagram by:", image: "", options: ["a. a horizontal line", "b. a vertical line", "c. a portion of an ellipse", "d. a portion of a parabola", "e. a portion of a hyperbola"], answer: 4},
        {text: "19-15. An adiabatic process for an ideal gas is represented on a pV diagram by:", image: "", options: ["a. a horizontal line", "b. a vertical line", "c. a hyperbola", "d. a circle", "e. none of these"], answer: 4},
        {text: "19-16. During the time that latent heat is involved in a change of state:", image: "", options: ["a. the temperature will not change", "b. the substance will always expand", "c. a chemical reaction will take place", "d. molecular activity remains constant", "e. kinetic energy must change into potential energy"], answer: 0},
        {text: "19-17. The formation of ice is accompanied by:", image: "", options: ["a. absorbtion of heat", "b. temperature increase", "c. decrease in volume", "d. release of heat", "e. temperature decrease"], answer: 3},
        {text: "19-18. Inside a room at a uniform comfortable temperature, metallic objects generally feel cooler to the touch than wooden objects do. This is because:", image: "", options: ["a. a given mass of wood contains more heat than the same mass of metal", "b. metal conducts heat better than wood", "c. heat tends to flow from metal to wood", "d. the equilibrium temperature of metal in the room is lower than that of wood", "e. the human body, being organic, resembles wood more closely than it resembles metal"], answer: 1},
        {text: "19-19. The rate of heat flow through a slab is Q. If the slab thickness is doubled, its cross-sectional area is halved, and the temperature difference across it is doubled, then the rate of heat flow becomes:", image: "", options: ["a. 2Q", "b. Q/2", "c. Q", "d. Q/8", "e. 8Q"], answer: 1},
        {text: "19-20. The rate of heat flow through a slab does NOT depend upon the:", image: "", options: ["a. temperature difference between opposite faces of the slab", "b. thermal conductivity of the slab", "c. slab thickness", "d. across-sectional area of the slab", "e. specific heat of the slab"], answer: 4},
        {text: "19-21. A slab of material has area A, thickness L and thermal conductivity K. One of its surfaces is maintained at temperature t1 and the other surface is maintained at a lower temperature t2. The rate of heat flow is:", image: "", options: ["a. KA (t1 - t2)/L^2", "b. KL (t1 - t2)/A", "c. KA (t1 - t2)/L", "d. K (t1 - t2)/(LA)", "e. LA (t1 - t2)/K"], answer: 2},
        {text: "19-22. A thermos bottle works well because:", image: "", options: ["a. its glass walls are thin", "b. silvering reduces convection", "c. vacuum reduces heat radiation", "d. silver coating is a poor heat conductor", "e. none of the above"], answer: 4},
        {text: "19-23. Which of the following statements pertaining to a vacuum flask (thermos) is NOT correct?", image: "", options: ["a. silvering reduces radiation loss", "b. vacuum reduces conduction loss", "c. vacuum reduces convection loss", "d. vacuum reduces radiation loss", "e. glass walls reduce conduction loss"], answer: 3},
        {text: "19-24. An iron stove, used for heating a room by radiation, is more efficient if:", image: "", options: ["a. its inner surface is highly polished", "b. its inner surface is covered with aluminum paint", "c. its outer surface is covered with aluminum paint", "d. its outer surface is rough and black", "e. its outer surface is highly polished"], answer: 3},
        {text: "19-25. Steam (at 1 atm, and 100℃) enters a radiator and leaves as water (at 1 atm, and 80℃). Take the heat of vaporization to be 2260 J/gm. Of the total heat given off, what percent arises from the cooling of the water?", image: "", options: ["a. 100", "b. 54", "c. 26", "d. 14", "e. 3.6"], answer: 4},

        {text: "20-1. A given mass of gas is enclosed in a suitable container so that it may be maintained at constant volume. Under these conditions, there can be no change is what property of the gas?", image: "", options: ["a. pressure", "b. density", "c. molecular kinetic energy", "d. internal energy", "e. temperature"], answer: 1},
        {text: "20-2. According to the kinetic theory of gases, the pressure of a gas is due to:", image: "", options: ["a. change of kinetic energy of molecules as they strike the wall", "b. change of momentum of molecules as the strike the wall", "c. average kinetic energy of the molecules", "d. force of repulsion between the molecules", "e. rms speed of the molecules"], answer: 1},
        {text: "20-3. A gas is confined to a cylindrical container of radius 1 cm and length 1 m. The pressure exerted on an end face, compared with the pressure exerted on the long curved face, is:", image: "", options: ["a. smaller because its area is smaller", "b. smaller because most molecules cannot traverse the length of the cylinder without undergoing collisions", "c. larger because the face is flat", "d. larger because the molecules have a greater distance in which to accelerate before they strike the face", "e. none of these"], answer: 4},
        {text: "20-4. Evidence that a gas consists mostly of empty space is the fact that:", image: "", options: ["a. the density of a gas becomes much greater when it is liquefied", "b. gases exert pressure on the walls of their containers", "c. gases are transparent", "d. heating a gas increases the molecular motion", "e. mature abhors a vacuum"], answer: 0},
        {text: "20-5. Evidence that molecules of a gas are in constant motion is:", image: "", options: ["a. winds exert pressure", "b. two gases inter diffuse quickly", "c. warm air rises", "d. heat is needed to vaporize a liquid", "e. gases are easily compressed"], answer: 1},
        {text: "20-6. The force exerted on the walls of a vessel by a contained gas is due to:", image: "", options: ["a. repulsive force between gas molecules", "b. slight loss in average speed of a gas molecule after collision with wall", "c. change in momentum of a gas molecule due to collision with wall", "d. elastic collisions between gas molecules", "e. inelastic collisions between gas molecules"], answer: 2},
        {text: "20-7. Air is pumped into a bicycle tire at constant temperature. The pressure increases because:", image: "", options: ["a. more molecules strike the tire wall per second", "b. the molecules are larger", "c. the molecules are farther apart", "d. each molecule is moving faster", "e. each molecule has more kinetic energy"], answer: 0},
        {text: "20-8. The mass of an oxygen molecule is 16 times that of a hydrogen molecule. At room temperature, the ratio of the rms speed of an oxygen molecule to that of a hydrogen molecule is:", image: "", options: ["a. 16", "b. 4", "c. 1", "d. 1/4", "e. 1/16"], answer: 3},
        {text: "20-9. The rms speed of an oxygen molecule at 0℃ is 460 m/s. If the molecular weight of oxygen is 32 and of helium is 4, then the rms speed of a helium molecule at 0℃ is:", image: "", options: ["a. 230 m/s", "b. 326 m/s", "c. 650 m/s", "d. 920 m/s", "e. 1300 m/s"], answer: 4},
        {text: "20-10. A sample of oxygen gas (molecular weight 32) is at four times the absolute temperature of a sample of hydrogen gas (molecular weight 2). The ratio of the rms speed of the oxygen molecules to that of the hydrogen is:", image: "", options: ["a. 1/4", "b. 1/2", "c. 1/√2", "d. 1", "e. √2"], answer: 1},
        {text: "20-11. The temperature of low pressure hydrogen is reduced from 100℃ to 20℃. The rms speed of its molecules decreases by approximately:", image: "", options: ["a. 80 %", "b. 89 %", "c. 46 %", "d. 21 %", "e. 11 %"], answer: 4},
        {text: "20-12. The Principle of Equipartition of Energy states that the energy of a gas is shared equally:", image: "", options: ["a. among the molecules", "b. between kinetic and potential energy", "c. among the relevant degrees of freedom", "d. between translational and vibrational kinetic energy", "e. between heat and work"], answer: 2},
        {text: "20-13. The ratio of the specific heat of a gas at constant volume to its specific heat at constant pressure is:", image: "", options: ["a. 1", "b. less than 1", "c. more than 1", "d. has units of pressure/volume", "e. has units of volume/pressure"], answer: 1},
        {text: "20-14. The number of degrees of freedom of a rigid diatomic molecule is:", image: "", options: ["a. 2", "b. 3", "c. 4", "d. 5", "e. 6"], answer: 3},
        {text: "20-15. An ideal diatomic gas has a molar heat capacity at constant pressure, CP, of:", image: "", options: ["a. R", "b. 3R/2", "c. 5R/2", "d. 7R/2", "e. 9R/2"], answer: 3},
        {text: "20-16. If the molecules in a tank of hydrogen have the same rms speed as the molecules in a tank of oxygen, we may be sure that:", image: "", options: ["a. the pressures are the same", "b. the hydrogen is at the higher temperature", "c. the tanks will burst", "d. the temperatures are the same", "e. the oxygen is at the higher temperature"], answer: 4},
        {text: "20-17. The mean free path of a gas molecule is:", image: "", options: ["a. the shortest dimension of the containing vessel", "b. the cube root of the volume of the containing vessel", "c. approximately the diameter of a molecule", "d. average distance between adjacent molecules", "e. average distance a molecule travels between intermolecular collisions"], answer: 4},
        {text: "20-18. The number of degrees of freedom of a diatomic molecule is:", image: "", options: ["a. 1", "b. 3", "c. 6", "d. 8", "e. 9"], answer: 4},
        {text: "20-19. Your professor has mentioned the two specific heats, CP and CV but never CT. This is because:", image: "", options: ["a. CT = 0", "b. CT is infinite", "c. CT can be obtained from the other two specific heats by simply adding or subtracting R", "d. the implied process is impossible", "e. one needs only two specific heats to form the ratio for δ"], answer: 3},
        {text: "20-20. A system consists of N gas molecules each of mass m. Their rms speed is Vrms. Their total translational kinetic energy is:", image: "", options: ["a. (1/2) m (NV/rms)2", "b. (1/2) N (mv/rms)2", "c. (1/2) (mv/rms)2", "d. (1/2) (Nmv/rms)2", "e. N((1/2) mv/rms)2"], answer: 3},

        // ======= Chapter 21 =======
        {text: "21-1. In a thermally insulated kitchen, an ordinary refrigerator is turned on and its door is left open. The temperature of the room:", image: "", options: ["a. remains constant by first law", "b. increases by first law", "c. decreases by first law", "d. remains constant by second law", "e. increases by second law"], answer: 1},
        {text: "21--2. A heat engine operates between 200 K and 100 K. In each cycle it takes 100 J from the hot reservoir, loses 25 J to the cold reservoir and does 75 J of work. This heat engine violates:", image: "", options: ["a. both the first and second laws of thermodynamics", "b. the first law but not the second law of thermodynamics", "c. the second law but not the first law of thermodynamics", "d. neither the first law no the second law of thermodynamics", "e. cannot answer without knowing the mechanical equivalent of heat"], answer: 2},
        {text: "21-3. A reversible heat engine operates between a hot reservoir at absolute temperature T1 and a cold reservoir at absolute temperature T2. Its efficiency is:", image: "", options: ["a. T1/T2", "b. T2/T1", "c. 1 - T1/T2", "d. 1 - T2/T1", "e. 100 %"], answer: 3},
        {text: "21-4. A certain heat engine draws 500 J/s from a water bath at 27℃ and rejects 400 J/s to a reservoir at a lower temperature. The efficiency of this engine is:", image: "", options: ["a. 80 %", "b. 75 %", "c. 55 %", "d. 25 %", "e. 20 %"], answer: 4},
        {text: "21--5. A heat engine operates between 200℃ and 20℃. Its maximum possible efficiency is:", image: "", options: ["a. 90 %", "b. 100 %", "c. 38 %", "d. 72 %", "e. 24 %"], answer: 2},
        {text: "21--6. A Carnot cycle:", image: "", options: ["a. is bounded by two isothermal and two adiabatic curves", "b. is a rectangle on a p-V graph", "c. is any four sided process on a p-V graph", "d. only exists for an ideal gas", "e. has an efficiency equal to the enclosed area on a p-V diagram"], answer: 0},

    let currentQuestion;
    let totalAttempted = 0;
    let correctCount = 0;
    let hasAnswered = false;
    let gay=50;
    function loadNextQuestion() {
        hasAnswered = false;
        document.getElementById("next-btn").style.display = "none";
        const randomIndex = Math.floor(Math.random() * questionBank.length);
        currentQuestion = questionBank[randomIndex];
        document.getElementById("q-text").innerText = currentQuestion.text;

        const imgElement = document.getElementById("q-img");
        if (currentQuestion.image && currentQuestion.image !== "") {
            imgElement.src = currentQuestion.image;
            imgElement.style.display = "block";
        } else {
            imgElement.style.display = "none";
        }

        const optionsArea = document.getElementById("options-area");
        optionsArea.innerHTML = "";
        currentQuestion.options.forEach((opt, index) => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index, btn);
            optionsArea.appendChild(btn);
        });
    }

    function checkAnswer(selectedIndex, btnElement) {
        if (hasAnswered) return;
        hasAnswered = true;
        totalAttempted++;
        const buttons = document.querySelectorAll(".option-btn");
        if (selectedIndex === currentQuestion.answer) {
            btnElement.classList.add("correct");
            correctCount++;
        } else {
            btnElement.classList.add("wrong");
            buttons[currentQuestion.answer].classList.add("correct");
        }
        document.getElementById("attempted").innerText = `已作答: ${totalAttempted} 題`;
        document.getElementById("correct-count").innerText = `答對: ${correctCount} 題`;
        const accuracy = ((correctCount / totalAttempted) * 100).toFixed(1);
        document.getElementById("score").innerText = `正確率: ${accuracy}%`;
        document.getElementById("next-btn").style.display = "block";
    }

    window.onload = loadNextQuestion;
</script>
